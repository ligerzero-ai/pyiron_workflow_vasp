# This runs jobs which pyiron modules should run on pushes or PRs to main
name: Push-Pull

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  pyiron:
    uses: pyiron/actions/.github/workflows/push-pull.yml@actions-4.0.8
    with:
      runner: 'ubuntu-22.04'
      python-version-alt3: 'exclude'
      runner-alt1: 'exclude'
      # The ligerzero-ai org does not define DEPENDABOT_WORKFLOW_TOKEN; the
      # commit-updated-env job's checkout step fails for lack of the secret.
      # Disable it here; flip back on after the org migration to pyiron/.
      do-commit-updated-env: false
    secrets: inherit
